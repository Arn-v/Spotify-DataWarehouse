services:
  postgres:
    image: postgres:16
    container_name: spotify_dw_postgres
    environment:
      POSTGRES_DB: spotify_dw
      POSTGRES_USER: spotify
      POSTGRES_PASSWORD: spotify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotify -d spotify_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
